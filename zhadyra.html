<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Zhadyra</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Карточка */
.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

/* Фото */
.card img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #3b82f6;
    margin-bottom: 15px;
}

/* Имя */
h1 {
    margin: 10px 0;
    color: #1e3a8a;
}

/* Инфо */
.info p {
    margin: 6px 0;
    font-size: 15px;
}

/* Описание */
.card p {
    font-size: 14px;
    color: #555;
}

/* Кнопка */
a {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #1e3a8a;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    background: #3b82f6;
}

/* Анимация */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="card">

    <img src="me.jpg" alt="Zhadyra">

    <h1>Жадыра</h1>

    <div class="info">
        <p><b>Группа:</b> ВТиПО-11</p>
        <p><b>Регион:</b> Абай область</p>
        <p><b>Село:</b> Каратал</p>
        <p><b>Дата рождения:</b> 08.11.2007</p>
    </div>

    <p>Я студентка IT-специальности 💻  
    Изучаю программирование и веб-разработку.</p>

    <a href="index.html">⬅ Назад</a>

</div>

</body>
</html>
